<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WireTalk - P2P Chat</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>

  <body>
    <main class="container">
      <header class="header">
        <h1>WireTalk P2P</h1>
        <div class="connection-status" id="connection-status">
          <div class="status-indicator" id="status-indicator"></div>
          <span id="status-text">Disconnected</span>
        </div>
      </header>

      <div class="chat-container">
        <aside class="sidebar">
          <div class="user-setup">
            <h3>P2P Network Setup</h3>
            <div class="form-group">
              <input 
                id="username-input" 
                placeholder="Enter your username..."
                maxlength="20"
              />
              <button id="set-username-btn" type="button">Set Username</button>
            </div>
            <button id="join-network-btn" type="button" disabled>Join P2P Network</button>
            <div id="peer-info" class="peer-info" style="display: none;">
              <h4>Your Peer ID:</h4>
              <code id="peer-id-display"></code>
            </div>
          </div>
          
          <div class="rooms-section" style="display: none;" id="rooms-section">
            <h3>Chat Rooms</h3>
            <div class="room-controls">
              <div class="form-group">
                <input 
                  id="room-name-input" 
                  placeholder="Room name..."
                  maxlength="30"
                />
                <button id="create-room-btn" type="button">Create Room</button>
              </div>
              <div class="form-group">
                <input 
                  id="room-id-input" 
                  placeholder="Room ID to join..."
                  maxlength="36"
                />
                <button id="join-room-btn" type="button">Join Room</button>
              </div>
            </div>
            <div class="current-room" id="current-room" style="display: none;">
              <h4>Current Room:</h4>
              <div class="room-info">
                <span id="current-room-name">None</span>
                <div class="current-room-actions">
                  <button id="copy-current-room-btn" type="button" class="small-btn" style="display: none;" title="Copy Current Room ID">Copy ID</button>
                  <button id="leave-current-room-btn" type="button" class="small-btn">Leave</button>
                </div>
              </div>
            </div>
            <div class="joined-rooms">
              <h4>Joined Rooms (<span id="rooms-count">0</span>)</h4>
              <ul id="rooms-list" class="rooms-list"></ul>
            </div>
          </div>
          
          <div class="peers-section">
            <h3>Connected Peers (<span id="peer-count">0</span>)</h3>
            <ul id="peers-list" class="peers-list"></ul>
            <div class="peer-actions">
              <button id="invite-peer-btn" type="button" class="small-btn">Invite Peer</button>
            </div>
          </div>
        </aside>

        <div class="chat-main">
          <div class="messages-container" id="messages-container">
            <div class="welcome-message">
              <p>Welcome to WireTalk P2P!</p>
              <p>Set your username and join the network to start chatting with peers.</p>
            </div>
          </div>
          
          <form class="message-form" id="message-form">
            <div class="message-input-container">
              <input 
                id="message-input" 
                placeholder="Type your message..." 
                maxlength="500"
                disabled
              />
              <button type="submit" id="send-btn" disabled>Send</button>
            </div>
          </form>
        </div>
      </div>
    </main>
  </body>
</html>
